  namespace: PlusPim.Debuggers.PlusPimDbg.Instruction.Pseudo
  remarks: >-
    Pattern:<br />

    <pre><code class="lang-csharp">^\\$(?&lt;rt&gt;\\w+),\\s*(?&lt;label&gt;\\w+)$</code></pre><br />
        Explanation:<br />
        <pre><code class="lang-csharp">○ Match if at the beginning of the string.
    ○ Match '$'.

    ○ "rt" capture group.
        ○ Match a word character atomically at least once.
    ○ Match ','.

    ○ Match a whitespace character atomically any number of times.

    ○ "label" capture group.
        ○ Match a word character atomically at least once.
    ○ Match if at the end of the string or if before an ending newline.</code></pre>
  example: []
  syntax:
    content: >-
      [GeneratedRegex("^\\$(?<rt>\\w+),\\s*(?<label>\\w+)$")]

      private static Regex LaOperandsPattern()
    return:
      type: System.Text.RegularExpressions.Regex
    content.vb: >-
      <GeneratedRegex("^\$(?<rt>\w+),\s*(?<label>\w+)$")>

      Private Shared Function LaOperandsPattern() As Regex
