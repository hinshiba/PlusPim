  namespace: PlusPim.Debuggers.PlusPimDbg.Instruction.Parser
  remarks: >-
    Pattern:<br />

    <pre><code class="lang-csharp">^(?&lt;op&gt;\\w+!?)(\\s+(?&lt;operands&gt;.+))?$</code></pre><br />
        Explanation:<br />
        <pre><code class="lang-csharp">○ Match if at the beginning of the string.
    ○ "op" capture group.
        ○ Match a word character greedily at least once.
        ○ Match '!' greedily, optionally.
    ○ Optional (greedy).
        ○ 1st capture group.
            ○ Match a whitespace character greedily at least once.
            ○ "operands" capture group.
                ○ Match a character other than '\n' greedily at least once.
    ○ Match if at the end of the string or if before an ending newline.</code></pre>
  example: []
  syntax:
    content: >-
      [GeneratedRegex("^(?<op>\\w+!?)(\\s+(?<operands>.+))?$")]

      private static Regex AssemblyLinePattern()
    return:
      type: System.Text.RegularExpressions.Regex
    content.vb: >-
      <GeneratedRegex("^(?<op>\w+!?)(\s+(?<operands>.+))?$")>

      Private Shared Function AssemblyLinePattern() As Regex
